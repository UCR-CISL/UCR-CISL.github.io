name: Convert teaching.bib to YAML

on:
  push:
    branches: [ "main" ]
    paths:
      - 'assets/teaching.bib'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11.13'
      - name: Install dependencies
        run: pip install bibtexparser pyyaml
      - name: Convert teaching.bib to YAML
        run: python ./assets/bib2yml_teaching.py --bibtex_fp ./assets/teaching.bib
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add _data/teaching_auto.yml
          git commit -m "Auto-update teaching_auto.yml from bib (trigger: ${{ github.sha }})" || echo "No changes"
          git push
